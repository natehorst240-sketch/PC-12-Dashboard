name: Fetch PC-12 Due List

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Fetch PC-12 Due List
        env:
          FLIGHTDOCS_USERNAME: ${{ secrets.FLIGHTDOCS_USERNAME }}
          FLIGHTDOCS_PASSWORD: ${{ secrets.FLIGHTDOCS_PASSWORD }}
          FLIGHTDOCS_HEADLESS: 'true'
        run: npm run fetch-due-list

      - name: Commit updated CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/PC12-Daily-Due-List.csv
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update PC12-Daily-Due-List.csv [skip ci]"
            git push origin HEAD
          fi
